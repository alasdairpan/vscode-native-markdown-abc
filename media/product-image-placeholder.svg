<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Native Markdown ABC product image placeholder</title>
  <desc id="desc">Placeholder graphic for a future product image combining the source markdown content and rendered ABC preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" rx="28" />
  <rect x="70" y="70" width="1460" height="760" rx="24" fill="#0b1220" stroke="#374151" stroke-width="2" />
  <rect x="110" y="140" width="540" height="590" rx="18" fill="#111827" stroke="#4b5563" />
  <rect x="700" y="140" width="790" height="590" rx="18" fill="#111827" stroke="#4b5563" />
  <text x="110" y="105" fill="#f9fafb" font-family="Verdana, sans-serif" font-size="32" font-weight="700">Product Image Placeholder</text>
  <text x="110" y="775" fill="#d1d5db" font-family="Verdana, sans-serif" font-size="28">Replace this graphic with a composed image of:</text>
  <text x="145" y="815" fill="#d1d5db" font-family="Verdana, sans-serif" font-size="26">1. Source Markdown showing an abc fenced code block</text>
  <text x="145" y="850" fill="#d1d5db" font-family="Verdana, sans-serif" font-size="26">2. The VS Code Markdown preview rendering the notation</text>
  <text x="145" y="270" fill="#93c5fd" font-family="Menlo, monospace" font-size="26">~~~abc</text>
  <text x="145" y="310" fill="#e5e7eb" font-family="Menlo, monospace" font-size="24">X:1</text>
  <text x="145" y="345" fill="#e5e7eb" font-family="Menlo, monospace" font-size="24">T: Cooley's</text>
  <text x="145" y="380" fill="#e5e7eb" font-family="Menlo, monospace" font-size="24">M: 4/4</text>
  <text x="145" y="415" fill="#e5e7eb" font-family="Menlo, monospace" font-size="24">K: Emin</text>
  <text x="145" y="470" fill="#9ca3af" font-family="Verdana, sans-serif" font-size="26">Markdown source panel</text>
  <text x="760" y="210" fill="#f9fafb" font-family="Verdana, sans-serif" font-size="30" font-weight="700">Rendered ABC preview</text>
  <g stroke="#e5e7eb" stroke-width="3" fill="none" opacity="0.9">
    <line x1="770" y1="290" x2="1430" y2="290" />
    <line x1="770" y1="315" x2="1430" y2="315" />
    <line x1="770" y1="340" x2="1430" y2="340" />
    <line x1="770" y1="365" x2="1430" y2="365" />
    <line x1="770" y1="390" x2="1430" y2="390" />
    <circle cx="900" cy="345" r="10" fill="#e5e7eb" />
    <circle cx="980" cy="330" r="10" fill="#e5e7eb" />
    <circle cx="1060" cy="355" r="10" fill="#e5e7eb" />
    <circle cx="1140" cy="320" r="10" fill="#e5e7eb" />
    <circle cx="1220" cy="345" r="10" fill="#e5e7eb" />
    <line x1="910" y1="345" x2="910" y2="285" />
    <line x1="990" y1="330" x2="990" y2="270" />
    <line x1="1070" y1="355" x2="1070" y2="295" />
    <line x1="1150" y1="320" x2="1150" y2="260" />
    <line x1="1230" y1="345" x2="1230" y2="285" />
  </g>
  <text x="760" y="470" fill="#9ca3af" font-family="Verdana, sans-serif" font-size="26">Preview panel</text>
</svg>